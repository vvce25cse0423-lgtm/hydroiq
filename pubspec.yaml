name: hydroiq
description: HydroIQ - Smart Hydration Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  supabase_flutter: ^2.5.6
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  fl_chart: ^0.68.0
  http: ^1.2.2
  permission_handler: ^11.3.1
  geolocator: ^11.1.0
  pedometer: ^4.0.2
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.3
  intl: ^0.19.0
  uuid: ^4.4.2
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  cupertino_icons: ^1.0.8
  sensors_plus: ^5.0.1
  volume_controller: ^2.0.7
  speech_to_text: ^6.6.2
  wakelock_plus: ^1.2.8
  audioplayers: ^6.0.0
  workmanager: ^0.5.2
  health: ^12.2.0
  pdf: ^3.10.8
  printing: ^5.12.0
  share_plus: ^10.0.0
  open_file: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
