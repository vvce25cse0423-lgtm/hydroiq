pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def localPropertiesFile = file("local.properties")
        if (localPropertiesFile.exists()) {
            localPropertiesFile.withReader("UTF-8") { reader -> properties.load(reader) }
        }
        def path = properties.getProperty("flutter.sdk")
        if (path == null) {
            path = System.getenv("FLUTTER_ROOT")
        }
        if (path == null) {
            // Last resort: resolve from flutter binary on PATH
            def proc = ["bash", "-c", "which flutter"].execute()
            proc.waitFor()
            def flutterBin = proc.text.trim()
            if (flutterBin) {
                path = new File(flutterBin).parentFile.parentFile.absolutePath
            }
        }
        assert path != null, "Could not locate Flutter SDK"
        path
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
